<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Justificaciones — ULEAM</title>
    <meta name="description"
        content="Genera oficios de justificación académica para la Universidad Laica Eloy Alfaro de Manabí de forma rápida y sencilla." />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "system-ui", "sans-serif"],
                    },
                },
            },
        };
    </script>

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/styles.css" />

    <!-- Librerías para generación de .docx -->
    <script src="https://cdn.jsdelivr.net/npm/pizzip@3.1.7/dist/pizzip.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docxtemplater@3.50.0/build/docxtemplater.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>

    <link rel="icon" href="uleamicon401.ico" type="image/x-icon" />
</head>

<body class="font-sans text-slate-800 antialiased relative overflow-x-hidden">
    <!-- Orbes decorativos de fondo -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Contenedor principal -->
    <main class="relative z-10 min-h-screen flex items-center justify-center py-10 px-4">
        <div class="w-full max-w-2xl">

            <!-- Header -->
            <header class="text-center mb-8 animate-fade-in-up">
                <div class="inline-flex items-center gap-3 mb-4">
                    <div
                        class="w-12 h-12 rounded-xl bg-gradient-to-br from-cyan-200 via-sky-300 to-blue-400 flex items-center justify-center shadow-lg shadow-sky-500/25">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7 text-white" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <div>
                        <h1
                            class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white to-sky-200 bg-clip-text text-transparent">
                            Generador de Justificaciones
                        </h1>
                    </div>
                </div>
                <p class="text-slate-100 text-sm max-w-md mx-auto">
                    Completa los datos para generar automáticamente tu oficio de justificación académica
                </p>
            </header>

            <!-- Formulario / Glass Card -->
            <div class="glass-card rounded-2xl p-8 md:p-10 animate-fade-in-up" style="animation-delay: 0.15s">
                <form id="justificacion-form" autocomplete="off">

                    <!-- ===== Datos Personales ===== -->
                    <h2 class="text-sm font-bold text-sky-300 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        Datos Personales
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 mb-8">

                        <!-- Nombre Completo -->
                        <div class="form-group md:col-span-2">
                            <label for="nombre"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Nombre Completo
                            </label>
                            <input type="text" id="nombre" class="form-input w-full rounded-lg px-4 py-2.5 text-sm"
                                placeholder="Ej: Juan Pérez García" />
                        </div>

                        <!-- Cédula -->
                        <div class="form-group">
                            <label for="cedula"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Cédula de Identidad
                            </label>
                            <input type="text" id="cedula" data-numeric
                                class="form-input w-full rounded-lg px-4 py-2.5 text-sm" placeholder="Ej: 1312345678"
                                maxlength="10" inputmode="numeric" />
                        </div>

                        <!-- Teléfono -->
                        <div class="form-group">
                            <label for="telefono"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Teléfono
                            </label>
                            <input type="text" id="telefono" data-numeric
                                class="form-input w-full rounded-lg px-4 py-2.5 text-sm" placeholder="Ej: 0991234567"
                                maxlength="10" inputmode="numeric" />
                        </div>

                        <!-- Período Académico -->
                        <div class="form-group">
                            <label for="periodo"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Período Académico
                            </label>
                            <select id="periodo" required
                                class="form-input form-select w-full rounded-lg px-4 py-2.5 text-sm cursor-pointer invalid:text-slate-400">
                                <option value="" disabled selected>--Selecciona tu periodo--</option>
                                <option value="2026-1" class="text-black">2026-1</option>
                                <option value="2026-2" class="text-black">2026-2</option>
                                <option value="2027-1" class="text-black">2027-1</option>
                            </select>
                        </div>

                        <!-- Correo Institucional -->
                        <div class="form-group">
                            <label for="correoInsti"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Correo Institucional
                            </label>
                            <input type="email" id="correoInsti"
                                class="form-input w-full rounded-lg px-4 py-2.5 text-sm"
                                placeholder="Ej: e1234567890@live.uleam.edu.ec" />
                        </div>

                        <!-- Carrera -->
                        <div class="form-group md:col-span-2">
                            <label for="carrera"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Carrera
                            </label>
                            <input type="text" id="carrera" class="form-input w-full rounded-lg px-4 py-2.5 text-sm"
                                placeholder="Ej: Tecnologías de la Información" />
                        </div>

                        <!-- Semestre -->
                        <div class="form-group">
                            <label for="nivel"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Semestre
                            </label>
                            <input type="text" id="nivel" class="form-input w-full rounded-lg px-4 py-2.5 text-sm"
                                placeholder="Ej: Quinto" />
                        </div>

                        <!-- Paralelo -->
                        <div class="form-group">
                            <label for="paralelo"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Paralelo
                            </label>
                            <input type="text" id="paralelo" class="form-input w-full rounded-lg px-4 py-2.5 text-sm"
                                placeholder="Ej: A" />
                        </div>

                        <!-- Motivo -->
                        <div class="form-group md:col-span-2">
                            <label for="motivo"
                                class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1.5">
                                Motivo de Justificación
                            </label>
                            <textarea id="motivo" rows="3"
                                class="form-input w-full rounded-lg px-4 py-2.5 text-sm resize-none"
                                placeholder="Describe el motivo de tu justificación..."></textarea>
                        </div>
                    </div>

                    <!-- ===== Materias a Justificar (Dinámicas) ===== -->
                    <h2 class="text-sm font-bold text-sky-300 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        Materias a Justificar
                    </h2>

                    <div id="materias-container">
                        <!-- Materia 1 (siempre presente) -->
                        <div class="materia-row glass-card rounded-xl p-4 mb-3 relative" data-index="0">
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-xs font-bold text-sky-300 uppercase tracking-wider">Materia #1</span>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                <div>
                                    <label
                                        class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1">Asignatura</label>
                                    <input type="text" name="materia"
                                        class="form-input materia-input w-full rounded-lg px-3 py-2 text-sm"
                                        placeholder="Ej: Prog. Web" />
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1">Docente</label>
                                    <input type="text" name="docente"
                                        class="form-input materia-input w-full rounded-lg px-3 py-2 text-sm"
                                        placeholder="Ej: Ing. López" />
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-1">Horas
                                        Clase</label>
                                    <input type="text" name="horas"
                                        class="form-input materia-input w-full rounded-lg px-3 py-2 text-sm"
                                        placeholder="Ej: 08:00-10:00" />
                                </div>
                                <div>
                                    <label
                                        class="block text-xs font-semibold text-slate-100 uppercase tracking-wider mb-0.5">Fecha</label>
                                    <input type="date" name="fecha"
                                        class="form-input materia-input w-full rounded-lg px-3 py-2 text-sm text-black" />
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Botón agregar materia -->
                    <button type="button" id="btn-agregar-materia"
                        class="w-full mt-2 mb-6 py-2.5 rounded-xl border-2 border-dashed border-sky-400/30 text-sky-300 text-sm font-semibold hover:border-sky-400/60 hover:bg-sky-400/5 transition-all duration-300 flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" />
                        </svg>
                        Agregar otra materia
                    </button>

                    <!-- Botones -->
                    <div class="flex flex-col sm:flex-row gap-3 mt-4">
                        <button type="button" id="btn-generar"
                            class="btn-primary flex-1 text-white font-semibold py-3 px-6 rounded-xl text-sm tracking-wide flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            Generar Justificación
                        </button>
                        <button type="button" id="btn-restablecer"
                            class="btn-secondary flex-1 text-slate-300 font-semibold py-3 px-6 rounded-xl text-sm tracking-wide flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                            </svg>
                            Restablecer
                        </button>
                    </div>
                </form>
            </div>

            <!-- Footer -->
            <footer class="text-center mt-8 text-slate-400 text-xs animate-fade-in-up" style="animation-delay: 0.3s">
                <p>ULEAM — Universidad Laica Eloy Alfaro de Manabí</p>
                <p class="mt-1">Automatización de Documentos Académicos</p>
            </footer>
        </div>
    </main>

    <!-- Módulo principal -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
